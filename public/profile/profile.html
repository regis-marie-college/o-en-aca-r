<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Account</title>

<link rel="stylesheet" href="../styles/profile.css">

</head>

<body class="profile">

<div class="account-container">

<div class="profile-card">

<!-- BACK BUTTON -->
<div class="top-bar">
<button onclick="window.location.href='dashboard.html'" class="back-btn">
← Back to Dashboard
</button>
</div>

<div class="profile-header">

<div class="profile-picture">
A
</div>

<h2>Angeline</h2>
<p class="role">Student Account</p>

</div>

<form class="profile-form">

<h3>Account Information</h3>

<div class="form-grid">

<div class="form-group">
<label>First Name</label>
<input type="text" value="Angeline">
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" value="Santos">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" value="angeline@email.com">
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="text" value="09123456789">
</div>

<div class="form-group">
<label>Birthday</label>
<input type="date">
</div>

<div class="form-group">
<label>Program</label>
<select>
<option>BSCS</option>
<option>BSOA</option>
<option>BSED</option>
<option>BEED</option>
</select>
</div>

</div>

<div class="buttons">

<button class="save-btn">Save Changes</button>

<button type="button" class="cancel-btn">Cancel</button>

</div>

</form>

</div>

</div>

</body>
</html>
