<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/user.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Profile</title>
  </head>

  <body>
    <div class="profile">
      <div data-component="../../components/sidebar.html"></div>

      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <div class="profile-card">
          <div class="profile-header">
            <div class="profile-picture" data-has-image="false">
              <span class="profile-picture-fallback">S</span>
              <span class="profile-picture-file">No 1x1 submitted</span>
            </div>

            <h2 class="profile-name">Student</h2>
            <p class="role">Student Account</p>
          </div>

          <form class="profile-form">
            <h3>Account Information</h3>

            <div class="form-grid">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="" readonly />
              </div>

              <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="" readonly />
              </div>

              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="" readonly />
              </div>

              <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="mobile" value="" readonly />
              </div>

              <div class="form-group">
                <label>Birthday</label>
                <input type="date" name="birthday" value="" readonly />
              </div>

              <div class="form-group">
                <label>Program</label>
                <input type="text" name="program" value="" readonly />
              </div>

              <div class="form-group">
                <label>Year Level</label>
                <input type="text" name="year_level" value="" readonly />
              </div>

              <div class="form-group">
                <label>Semester</label>
                <input type="text" name="semester" value="" readonly />
              </div>

              <div class="form-group">
                <label>Total Paid</label>
                <input type="text" name="total_paid" value="" readonly />
              </div>

              <div class="form-group">
                <label>Balance</label>
                <input type="text" name="total_balance" value="" readonly />
              </div>

              <div class="form-group">
                <label>Current Courses</label>
                <input type="text" name="current_courses" value="" readonly />
              </div>

              <div class="form-group">
                <label>Completed Courses</label>
                <input type="text" name="taken_courses" value="" readonly />
              </div>
            </div>
          </form>

          <section class="profile-section">
            <div class="section-heading">
              <h3>Submitted Requirements</h3>
              <p>These are the files submitted during enrollment.</p>
            </div>
            <div class="requirements-list" id="submitted-requirements"></div>
          </section>

          <section class="profile-section">
            <div class="section-heading">
              <h3>Payment Channels</h3>
              <p>Students can pay using GCash, BPI, RCBC, and Metrobank.</p>
            </div>
            <div class="payment-options" id="payment-options"></div>
          </section>
        </div>
      </main>
    </div>
    <script>
      const DOCUMENT_LABELS = {
        form137: "Form 137",
        idpic: "1x1 ID Picture",
        psa: "PSA Birth Certificate",
        moral: "Good Moral",
        diploma: "Diploma",
        others: "Other Documents",
      };

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-PH", {
          style: "currency",
          currency: "PHP",
        }).format(Number(value || 0));
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return map[char] || char;
        });
      }

      function renderDocuments(documents) {
        const container = document.querySelector("#submitted-requirements");

        if (!Array.isArray(documents) || documents.length === 0) {
          container.innerHTML =
            '<div class="empty-state">No submitted requirements found yet.</div>';
          return;
        }

        container.innerHTML = documents
          .map((document) => {
            const typeLabel =
              DOCUMENT_LABELS[document.type] || document.type || "Requirement";

            return `
              <article class="document-card">
                <span class="document-type">${escapeHtml(typeLabel)}</span>
                <strong>${escapeHtml(document.name || "Unnamed file")}</strong>
                <small>${escapeHtml(document.category || "Requirement")}</small>
              </article>
            `;
          })
          .join("");
      }

      function renderPaymentOptions(options) {
        const container = document.querySelector("#payment-options");

        if (!Array.isArray(options) || options.length === 0) {
          container.innerHTML =
            '<div class="empty-state">No payment channels configured yet.</div>';
          return;
        }

        container.innerHTML = options
          .map(
            (option) => `
              <article class="payment-card">
                <h4>${escapeHtml(option.label || "Payment Option")}</h4>
                <p><span>Account Name</span><strong>${escapeHtml(option.account_name || "Not yet configured")}</strong></p>
                <p><span>Account No.</span><strong>${escapeHtml(option.account_number || "Not yet configured")}</strong></p>
              </article>
            `,
          )
          .join("");
      }

      function renderProfilePicture(firstName, idPicture) {
        const profilePicture = document.querySelector(".profile-picture");
        const fallback = profilePicture.querySelector(".profile-picture-fallback");
        const fileLabel = profilePicture.querySelector(".profile-picture-file");

        fallback.textContent = (firstName || "S").charAt(0).toUpperCase();
        fileLabel.textContent = idPicture?.name || "No 1x1 submitted";
        profilePicture.dataset.hasImage = idPicture?.url ? "true" : "false";

        if (idPicture?.url) {
          profilePicture.innerHTML = `
            <img
              src="${escapeHtml(idPicture.url)}"
              alt="${escapeHtml(firstName || "Student")}"
              style="width:100%;height:100%;object-fit:cover;border-radius:22px;"
            />
          `;
          return;
        }

        profilePicture.innerHTML = `
          <span class="profile-picture-fallback">${escapeHtml(
            (firstName || "S").charAt(0).toUpperCase(),
          )}</span>
          <span class="profile-picture-file">${escapeHtml(
            idPicture?.name || "No 1x1 submitted",
          )}</span>
        `;
      }

      async function loadProfile() {
        const currentUser = auth();

        if (!currentUser?.email) {
          window.location.assign("/auth/login.html");
          return;
        }

        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/students/portal?email=${encodeURIComponent(currentUser.email)}`,
        );
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to load profile");
        }

        const {
          user,
          enrollment,
          current_courses,
          taken_courses,
          total_paid,
          total_balance,
          submitted_documents,
          id_picture,
          payment_options,
        } = data;
        const form = document.querySelector(".profile-form");
        const profileName = document.querySelector(".profile-name");

        const firstName = user?.first_name || "";
        const lastName = user?.last_name || "";
        const fullName = `${firstName} ${lastName}`.trim();

        profileName.textContent = fullName || "Student";
        renderProfilePicture(firstName, id_picture);

        form.querySelector('[name="first_name"]').value = firstName;
        form.querySelector('[name="last_name"]').value = lastName;
        form.querySelector('[name="email"]').value = user?.email || currentUser.email || "";
        form.querySelector('[name="mobile"]').value = user?.mobile || enrollment?.mobile || "-";
        form.querySelector('[name="birthday"]').value = enrollment?.birthday || "";
        form.querySelector('[name="program"]').value = enrollment?.program_name || enrollment?.program_code || "-";
        form.querySelector('[name="year_level"]').value = enrollment?.year_level || "-";
        form.querySelector('[name="semester"]').value = enrollment?.semester || "-";
        form.querySelector('[name="total_paid"]').value = formatCurrency(total_paid || 0);
        form.querySelector('[name="total_balance"]').value = formatCurrency(total_balance || 0);
        form.querySelector('[name="current_courses"]').value = String(
          Array.isArray(current_courses) ? current_courses.length : 0,
        );
        form.querySelector('[name="taken_courses"]').value = String(
          Array.isArray(taken_courses) ? taken_courses.length : 0,
        );

        renderDocuments(submitted_documents || []);
        renderPaymentOptions(payment_options || []);
      }

      document.addEventListener("DOMContentLoaded", async () => {
        try {
          await loadProfile();
        } catch (error) {
          console.error(error);
        }
      });
    </script>
  </body>
</html>
