<script src="../scripts/config.js" defer></script>

<form id="emailForm">
  <input type="email" id="email" placeholder="Recipient Email" required>
  <input type="text" id="subject" placeholder="Subject" required>
  <textarea id="message" placeholder="Message" required></textarea>
  <button type="submit">Send</button>
</form>
<div id="formMessage"></div>

<script>
document.getElementById("emailForm").addEventListener("submit", async (e) => {

  e.preventDefault();
  const message = document.getElementById("formMessage");

  try {
    const response = await fetch(`${window.APP_CONFIG.API_BASE_URL}/sendMail/mail`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      subject: document.getElementById("subject").value,
      message: document.getElementById("message").value
    })
  });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error || data.message || "Email failed to send");
    }

    message.innerHTML = "<span class='success'>Email sent!</span>";
  } catch (error) {
    message.innerHTML = `<span class='error'>${error.message}</span>`;
  }

});
</script>
