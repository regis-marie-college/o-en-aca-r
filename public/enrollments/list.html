<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>
  <body>
    <div class="users">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <a href="../programs/create.html" class="btn btn-primary"
          >+ Add Enrollment</a
        >
        <!-- Table -->
        <section class="table-section">
          <table id="table-enrollments">
            <thead>
              <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Mobile number</th>
                <th>Birthday</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      async function loadEnrollments() {
        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/enrollments/list`,
          );
          const data = await res.json();

          const tbody = document.querySelector("#table-enrollments tbody");
          tbody.innerHTML = "";

          data.forEach((enrollment) => {
            const row = document.createElement("tr");

            const { id, last_name, first_name, middle_name, email, mobile_number, birthday} = enrollment;

            row.innerHTML = `
              <td><a href="read.html?id=${id}">${id.substring(0, 6)}</a></td>
              <td>${last_name} ${first_name} ${middle_name}</td>
              <td>${email}</td>
              <td>${mobile_number}</td>
              <td>${birthday}</td>
            `;

            tbody.appendChild(row);
          });
        } catch (err) {
          console.error("Failed to load enrollments:", err);
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadEnrollments();
      });
    </script>
  </body>
</html>
