<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>
  <body>
    <div class="enrollments">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>
        <input class="search-box" value="" placeholder="Search" />
        <a href="form.html" class="link-enrollment-form" target="_blank"
          >Link to enrollment form</a
        >
        <!-- Table -->
        <section class="table-section">
          <table id="table-enrollments">
            <thead>
              <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Mobile number</th>
                <th>Birthday</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      async function initSearch() {
        const search_box = document.querySelector(".search-box");
    
        search_box.addEventListener("keyup", (e) => {
          if (e.code === "Enter") {
            loadEnrollments(search_box.value);
          }
        });
      }
    
      async function loadEnrollments(search = null) {
        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/enrollments/list${
              search ? "?search=" + search : ""
            }`
          );
    
          const data = await res.json();
    
          const tbody = document.querySelector("#table-enrollments tbody");
          tbody.innerHTML = "";
    
          data.forEach((enrollment) => {
            const row = document.createElement("tr");
    
            const {
              id,
              last_name,
              first_name,
              middle_name,
              email,
              mobile_number, 
              birthday,
              status
            } = enrollment;
    
            row.innerHTML = `
              <td>
                <a href="read.html?id=${id}" style="color:white;">
                  ${id.substring(0, 6)}
                </a>
              </td>
              <td>${last_name} ${first_name} ${middle_name || ""}</td>
              <td>${email}</td>
              <td>${mobile_number}</td>
              <td>${defaultDate(birthday)}</td>
              <td>
                <span class="status ${status}">
                  ${status}
                </span>
              </td>
            `;
    
            tbody.appendChild(row);
          });
        } catch (err) {
          console.error("Failed to load enrollments:", err);
        }
      }
    
      document.addEventListener("DOMContentLoaded", function () {
        loadEnrollments();
        initSearch();
      });
    </script>
  </body>
</html>
