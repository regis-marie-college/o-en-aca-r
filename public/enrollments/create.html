<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>
  <body>
    <div class="users">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <section class="form-section">
          <form id="createEnrollForm" class="form-card">
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="last_name" required />
            </div>

            <div class="form-group">
              <label>First Name</label>
              <input type="text" name="first_name" required />
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" required />
            </div>

            <div class="form-group">
              <label>Password</label>
              <input type="password" name="password" required />
            </div>

            <button type="button" class="btn btn-primary btn-lg">
              Create Account
            </button>
          </form>

          <div id="formMessage" class="form-message"></div>
        </section>
      </main>
    </div>

    <script>
      const form = document.querySelector("#createUserForm");
      const form_submit = document.querySelector("#createUserForm button");
      const message = document.getElementById("formMessage");
      
      form_submit.addEventListener("click", async (e) => {
        e.preventDefault();

        const button = form.querySelector("button");
        button.disabled = true;
        button.textContent = "Creating...";

        const formData = new FormData(form);

        const payload = {
          last_name: formData.get("last_name"),
          first_name: formData.get("first_name"),
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const response = await fetch(
            "http://localhost:8000/api/enrollments/create",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Something went wrong");
          }

          message.innerHTML =
            "<span class='success'>Enrollment created successfully!</span>";
          form.reset();
        } catch (error) {
          message.innerHTML = `<span class='error'>${error.message}</span>`;
        } finally {
          button.disabled = false;
          button.textContent = "Create Account";
        }
      });
    </script>
  </body>
</html>
