<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enrollment Portal</title>

<link rel="stylesheet" href="../styles/enrollments.css">

</head>

<body class="enrollment">

<form id="enrollmentForm" class="container">

<!-- LEFT SIDE -->
<div class="card">

<div class="logo">
<img src="../images/logo.png">
<span>REGIS MARIE COLLEGE</span>
</div>

<h2>Student Enrollment</h2>

<div class="form-group">
<label>Last Name</label>
<input type="text" name="last_name" required>
</div>

<div class="form-group">
<label>First Name</label>
<input type="text" name="first_name" required>
</div>

<div class="form-group">
<label>Middle Name</label>
<input type="text" name="middle_name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Mobile</label>
<input type="text"
name="mobile"
pattern="^09\d{9}$"
placeholder="09XXXXXXXXX"
required>
</div>

<div class="form-group">
<label>Birthday</label>
<input type="date" name="birthday" required>
</div>

<div class="form-group">
<label>Program</label>

<select name="program" required>

<option value="">Select Program</option>

<option value="BSCS">BSCS</option>
<option value="BSOA">BSOA</option>
<option value="BSED">BSED</option>
<option value="BEED">BEED</option>

</select>

</div>

</div>


<!-- RIGHT SIDE -->

<div class="card">

<h2>Submit Requirements</h2>

<div class="requirements-box">

<div class="requirement-item">
<label>Form 137</label>
<input type="file" id="form137" required>
</div>

<div class="requirement-item">
<label>1x1 ID Picture</label>
<input type="file" id="idpic" required>
</div>

<div class="requirement-item">
<label>PSA Birth Certificate</label>
<input type="file" id="psa" required>
</div>

<div class="requirement-item">
<label>Good Moral</label>
<input type="file" id="moral">
</div>

<div class="requirement-item">
<label>Diploma</label>
<input type="file" id="diploma">
</div>

<div class="requirement-item">
<label>Other Documents</label>
<input type="file" id="others">
</div>

</div>

</div>

<div class="submit-container">

<button type="submit">Submit Enrollment</button>

<div id="formMessage"></div>

</div>

</form>

</body>
</html>
