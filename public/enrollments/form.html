<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/enrollments.css" rel="stylesheet" />
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <img src="../images/logo.png" alt="Regis Marie College Logo" />
          <span>REGIS MARIE COLLEGE</span>
        </div>

        <ul class="nav-links">
          <li><a href="#">HOME</a></li>
          <li><a href="#">CONTACT US</a></li>
        </ul>
      </div>
    </nav>

    <!-- FORM CONTAINER -->
    <div class="container">
      <h2>Student Enrollment Form</h2>

      <!-- MESSAGE -->
      <div id="formMessage"></div>

      <form id="createUserForm" enctype="multipart/form-data">
        <label for="lastname">Last Name</label>
        <input type="text" id="lastname" name="last_name" required />

        <label for="firstname">First Name</label>
        <input type="text" id="firstname" name="first_name" required />

        <label for="middlename">Middle Name</label>
        <input type="text" id="middlename" name="middle_name" />

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
        <label for="mobile">Mobile Number</label>
        <input
          type="tel"
          id="mobile"
          name="mobile_number"
          placeholder="09XXXXXXXXX"
          pattern="^09\d{9}$"
          title="Please enter a valid 11-digit mobile number starting with 09"
          required
        />

        <label for="birthday">Birthday</label>
        <input type="date" id="birthday" name="birthday" required />

        <!-- <label for="program">Select Program</label>
            <select id="program" name="program" required>
                <option value="">-- Select Program --</option>
                <option value="BSCS">BSCS - Bachelor of Science in Computer Science</option>
                <option value="BSOA">BSOA - Bachelor of Science in Office Administration</option>
                <option value="BSED">BSED - Bachelor of Secondary Education</option>
                <option value="BEED">BEED - Bachelor of Elementary Education</option>
            </select>

            <label for="photo">Upload Picture</label>
            <input type="file" id="photo" name="photo" accept="image/*" required>
            -->
        <button type="submit">Submit Enrollment</button>
      </form>
    </div>

    <!-- SCRIPT -->
    <script>
      const form = document.querySelector("#createUserForm");
      const message = document.getElementById("formMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const button = form.querySelector("button");
        button.disabled = true;
        button.textContent = "Submitting...";

        const formData = {
          last_name: form.last_name.value,
          first_name: form.first_name.value,
          middle_name: form.middle_name.value,
          email: form.email.value,
          mobile_number: form.mobile_number.value,
          birthday: form.birthday.value,
        };

        try {
          const response = await fetch(
            "http://localhost:8000/api/enrollments/create",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(formData),
            },
          );
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Something went wrong");
          }

          message.innerHTML =
            "<span class='success'>Enrollment submitted successfully!</span>";
          form.reset();
        } catch (error) {
          message.innerHTML = `<span class='error'>${error.message}</span>`;
        } finally {
          button.disabled = false;
          button.textContent = "Submit Enrollment";
        }
      });
    </script>
  </body>
</html>
