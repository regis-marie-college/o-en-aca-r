<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>
  <body>
    <div class="form-enrollment">
      <form id="enrollmentForm">
        <div class="logo">
          <img src="../images/logo.png" />
          <span>REGIS MARIE COLLEGE</span>
        </div>
        <h2>Student Details</h2>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" required />
        </div>

        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" required />
        </div>

        <div class="form-group">
          <label>Middle Name</label>
          <input type="text" name="middle_name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required />
        </div>

        <div class="form-group">
          <label>Mobile</label>
          <input
            type="text"
            name="mobile"
            pattern="^09\d{9}$"
            placeholder="09XXXXXXXXX"
            required
          />
        </div>

        <div class="form-group">
          <label>Birthday</label>
          <input type="date" name="birthday" required />
        </div>

        <h2>Requirements</h2>
        <div class="requirement-item">
          <label>1x1 ID Picture</label>
          <input type="file" id="idpic" accept=".jpg,.jpeg,.png,.webp" required />
        </div>

        <h2>Select Program and Courses</h2>

        <div class="form-group">
          <label>Program</label>
          <select name="program" id="program" required>
            <option value="">Select Program</option>
          </select>
        </div>

        <div class="form-group">
          <label>Year Level</label>
          <select name="year_level" id="year_level" required>
            <option value="">Select Year Level</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
          </select>
        </div>

        <div class="form-group">
          <label>Semester</label>
          <select name="semester" id="semester" required>
            <option value="">Select Semester</option>
            <option value="1st Sem">1st Sem</option>
            <option value="2nd Sem">2nd Sem</option>
            <option value="3rd Sem">3rd Sem</option>
          </select>
        </div>

        <div class="form-group">
          <label>Available Courses</label>
          <div id="course-options" class="select-list"></div>
          <div id="course-selected" class="selected-list"></div>
        </div>

        <h2>Downpayment</h2>
        <p class="portal-form-note" style="margin-bottom: 14px">
          Submit your downpayment proof now. Treasury must approve this payment
          before admin can approve your enrollment application.
        </p>

        <div class="form-group">
          <label>Downpayment Amount</label>
          <input
            type="number"
            name="downpayment_amount"
            min="2000"
            step="0.01"
            value="2000"
            required
          />
        </div>

        <div class="form-group">
          <label>Payment Channel</label>
          <select name="payment_channel" id="payment_channel" required>
            <option value="">Select Payment Channel</option>
          </select>
        </div>

        <div class="portal-card-grid" id="payment-options"></div>

        <div class="form-group">
          <label>Reference Number</label>
          <input name="reference_no" placeholder="Enter payment reference number" required />
        </div>

        <div class="requirement-item">
          <label>Proof of Downpayment</label>
          <input
            type="file"
            id="proof_of_payment"
            accept=".jpg,.jpeg,.png,.pdf"
            required
          />
        </div>

        <button type="button" class="btn btn-primary btn-lg btn-enroll">
          Submit Enrollment
        </button>

        <div id="formMessage" class="form-message"></div>
      </form>
    </div>
    <script>
      const RATE_PER_UNIT = 300;
      const MISC_FEE = 0;
      const ID_FEE = 300;
      const MIN_DOWNPAYMENT = 2000;
      let courses = [];
      let paymentOptions = [];
      const selectedCourses = new Set();

      const form = document.querySelector("#enrollmentForm");
      const message = document.getElementById("formMessage");
      const optionsEl = document.querySelector("#course-options");
      const selectedEl = document.querySelector("#course-selected");
      const programEl = document.querySelector("#program");
      const yearLevelEl = document.querySelector("#year_level");
      const semesterEl = document.querySelector("#semester");
      const paymentChannelEl = document.querySelector("#payment_channel");
      const downpaymentAmountEl = form.querySelector('[name="downpayment_amount"]');

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-PH", {
          style: "currency",
          currency: "PHP",
        }).format(Number(value || 0));
      }

      async function uploadIdPicture(file) {
        const uploadData = new FormData();
        uploadData.append("id_picture", file);

        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/enrollments/upload-id-picture`,
          {
            method: "POST",
            body: uploadData,
          },
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to upload 1x1 ID picture");
        }

        return data;
      }

      async function uploadProofOfPayment(file) {
        const uploadData = new FormData();
        uploadData.append("proof_of_payment", file);

        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/enrollments/upload-proof`,
          {
            method: "POST",
            body: uploadData,
          },
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to upload proof of payment");
        }

        return data;
      }

      function getSelectedCourseObjects() {
        return [...selectedCourses]
          .map((id) => courses.find((course) => course.id === id))
          .filter(Boolean);
      }

      function updateDownpaymentMinimum() {
        const totalUnits = getSelectedCourseObjects().reduce(
          (sum, course) => sum + Number(course.units || 0),
          0,
        );
        const totalAmount = totalUnits * RATE_PER_UNIT;
        const totalAssessment = totalUnits > 0 ? totalAmount + MISC_FEE + ID_FEE : 0;
        const minimumDownpayment =
          totalUnits > 0 ? Math.min(MIN_DOWNPAYMENT, totalAssessment) : MIN_DOWNPAYMENT;

        downpaymentAmountEl.min = minimumDownpayment.toFixed(2);

        if (Number(downpaymentAmountEl.value || 0) < minimumDownpayment) {
          downpaymentAmountEl.value = minimumDownpayment.toFixed(2);
        }
      }

      function renderPaymentOptions(selectedKey = "") {
        const container = document.querySelector("#payment-options");

        if (!paymentOptions.length) {
          container.innerHTML =
            '<div class="empty-state">No payment channels configured yet.</div>';
          return;
        }

        if (!selectedKey) {
          container.innerHTML =
            '<div class="empty-state">Select a payment channel to view account details.</div>';
          return;
        }

        const selectedOption = paymentOptions.find(
          (option) => option.key === selectedKey,
        );

        if (!selectedOption) {
          container.innerHTML =
            '<div class="empty-state">Selected payment channel is not available.</div>';
          return;
        }

        container.innerHTML = `
          <article class="portal-mini-card">
            <span>${selectedOption.label || "Payment Option"}</span>
            <strong>${selectedOption.account_name || "Not yet configured"}</strong>
            <small>${selectedOption.account_number || "Not yet configured"}</small>
          </article>
        `;
      }

      async function loadPaymentOptions() {
        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/payment_options/list`,
        );
        const data = await response.json();
        paymentOptions = Array.isArray(data) ? data : [];

        paymentChannelEl.innerHTML = `
          <option value="">Select Payment Channel</option>
          ${paymentOptions
            .map(
              (option) => `
                <option value="${option.key || ""}">
                  ${option.label || "Payment Channel"}
                </option>
              `,
            )
            .join("")}
        `;
        renderPaymentOptions();
      }

      function renderOptions() {
        if (!courses.length) {
          optionsEl.innerHTML =
            "<div class='select-item' style='pointer-events:none;opacity:.7;'>Select a program, year level, and semester to view available courses.</div>";
          return;
        }

        optionsEl.innerHTML = courses
          .map(
            (course) => `
              <div class="select-item" data-id="${course.id}">
                ${course.name} (${course.units} units)
              </div>
            `,
          )
          .join("");
      }

      function renderSelected() {
        selectedEl.innerHTML = getSelectedCourseObjects()
          .map(
            (course) => `
              <div class="selected-item" data-id="${course.id}">
                ${course.name} (${course.units} units) x
              </div>
              <input type="hidden" name="course[]" value="${course.id}">
            `,
          )
          .join("");

        updateDownpaymentMinimum();
      }

      async function loadPrograms() {
        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/programs/list`,
        );
        const data = await response.json();

        programEl.innerHTML = `<option value="">Select Program</option>`;

        data.forEach((program) => {
          const option = document.createElement("option");
          option.value = `${program.id}:${program.name}:${program.code || ""}`;
          option.textContent = `${program.code || program.name} - ${program.name}`;
          programEl.appendChild(option);
        });
      }

      async function loadAvailableCourses() {
        selectedCourses.clear();
        renderSelected();

        const [programId] = (programEl.value || "").split(":");
        const yearLevel = yearLevelEl.value;
        const semester = semesterEl.value;

        if (!programId || !yearLevel || !semester) {
          courses = [];
          renderOptions();
          return;
        }

        const query = new URLSearchParams({
          program_id: programId,
          year_level: yearLevel,
          semester: semester,
        });

        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/courses/list?${query.toString()}`,
        );
        const data = await response.json();

        courses = Array.isArray(data) ? data : [];
        renderOptions();
      }

      optionsEl.addEventListener("click", (event) => {
        const item = event.target.closest(".select-item");

        if (!item || !courses.length) return;

        selectedCourses.add(item.dataset.id);
        renderSelected();
      });

      selectedEl.addEventListener("click", (event) => {
        const item = event.target.closest(".selected-item");

        if (!item) return;

        selectedCourses.delete(item.dataset.id);
        renderSelected();
      });

      [programEl, yearLevelEl, semesterEl].forEach((element) => {
        element.addEventListener("change", loadAvailableCourses);
      });

      paymentChannelEl.addEventListener("change", () => {
        renderPaymentOptions(paymentChannelEl.value);
      });

      form
        .querySelector("button.btn-enroll")
        .addEventListener("click", async (event) => {
          event.preventDefault();

          if (!form.reportValidity()) {
            return;
          }

          const selectedCourseObjects = getSelectedCourseObjects();

          if (!selectedCourseObjects.length) {
            message.innerHTML =
              "<span class='error'>Please select at least one available course.</span>";
            return;
          }

          const idPictureFile = document.getElementById("idpic").files[0];
          const proofFile = document.getElementById("proof_of_payment").files[0];

          if (!idPictureFile) {
            message.innerHTML =
              "<span class='error'>Please upload the student's 1x1 ID picture.</span>";
            return;
          }

          if (!proofFile) {
            message.innerHTML =
              "<span class='error'>Please upload your proof of downpayment.</span>";
            return;
          }

          const button = form.querySelector("button");
          button.disabled = true;
          button.textContent = "Submitting...";

          const totalUnits = selectedCourseObjects.reduce(
            (sum, course) => sum + Number(course.units || 0),
            0,
          );
          const totalAmount = totalUnits * RATE_PER_UNIT;
          const totalAssessment = totalAmount + MISC_FEE + ID_FEE;
          const minimumDownpayment = Math.min(MIN_DOWNPAYMENT, totalAssessment);
          const downpaymentAmount = Number(form.downpayment_amount.value || 0);
          const [program_id, program_name, program_code] = (
            form.program.value || ""
          ).split(":");

          if (downpaymentAmount < minimumDownpayment) {
            message.innerHTML = `<span class='error'>Minimum downpayment is ${formatCurrency(minimumDownpayment)}.</span>`;
            button.disabled = false;
            button.textContent = "Submit Enrollment";
            return;
          }

          if (downpaymentAmount > totalAssessment) {
            message.innerHTML =
              "<span class='error'>Downpayment cannot exceed total assessment.</span>";
            button.disabled = false;
            button.textContent = "Submit Enrollment";
            return;
          }

          const formData = {
            last_name: form.last_name.value,
            first_name: form.first_name.value,
            middle_name: form.middle_name.value,
            email: form.email.value,
            mobile: form.mobile.value,
            birthday: form.birthday.value,
            program_id,
            program_name,
            program_code,
            year_level: form.year_level.value,
            semester: form.semester.value,
            selected_courses: selectedCourseObjects.map((course) => ({
              id: course.id,
              name: course.name,
              units: Number(course.units || 0),
              amount: Number(course.units || 0) * RATE_PER_UNIT,
            })),
            total_units: totalUnits,
            total_amount: totalAmount,
          };

          try {
            const uploadedIdPicture = await uploadIdPicture(idPictureFile);
            const uploadedProof = await uploadProofOfPayment(proofFile);

            const response = await fetch(
              `${window.APP_CONFIG.API_BASE_URL}/enrollments/create`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  ...formData,
                  idpic_url: uploadedIdPicture.file_url,
                  documents: {
                    idpic: {
                      name: uploadedIdPicture.file_name,
                      url: uploadedIdPicture.file_url,
                    },
                  },
                  downpayment_amount: downpaymentAmount,
                  payment_channel: form.payment_channel.value,
                  reference_no: form.reference_no.value,
                  proof_of_payment: uploadedProof.file_url,
                }),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || data.error || "Something went wrong");
            }

            message.innerHTML =
              "<span class='success'>Enrollment submitted successfully!</span>";
            form.reset();
            courses = [];
            selectedCourses.clear();
            renderOptions();
            renderSelected();
            renderPaymentOptions();
          } catch (error) {
            message.innerHTML = `<span class='error'>${error.message}</span>`;
          } finally {
            button.disabled = false;
            button.textContent = "Submit Enrollment";
          }
        });

      document.addEventListener("DOMContentLoaded", async () => {
        await Promise.all([loadPrograms(), loadPaymentOptions()]);
        renderOptions();
        renderSelected();
      });
    </script>
  </body>
</html>
