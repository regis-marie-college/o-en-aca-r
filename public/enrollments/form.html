<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>
  <body>
    <div class="form-enrollment">
      <form id="enrollmentForm">
        <div class="logo">
          <img src="../images/logo.png" />
          <span>REGIS MARIE COLLEGE</span>
        </div>
        <h2>Student Details</h2>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="last_name" required />
        </div>

        <div class="form-group">
          <label>First Name</label>
          <input type="text" name="first_name" required />
        </div>

        <div class="form-group">
          <label>Middle Name</label>
          <input type="text" name="middle_name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required />
        </div>

        <div class="form-group">
          <label>Mobile</label>
          <input
            type="text"
            name="mobile"
            pattern="^09\d{9}$"
            placeholder="09XXXXXXXXX"
            required
          />
        </div>

        <div class="form-group">
          <label>Birthday</label>
          <input type="date" name="birthday" required />
        </div>

        <h2>Requirements</h2>
        <div class="requirement-item">
          <label>Form 137</label>
          <input type="file" id="form137" required />
        </div>

        <div class="requirement-item">
          <label>1x1 ID Picture</label>
          <input type="file" id="idpic" required />
        </div>

        <div class="requirement-item">
          <label>PSA Birth Certificate</label>
          <input type="file" id="psa" required />
        </div>

        <div class="requirement-item">
          <label>Good Moral</label>
          <input type="file" id="moral" />
        </div>

        <div class="requirement-item">
          <label>Diploma</label>
          <input type="file" id="diploma" />
        </div>

        <div class="requirement-item">
          <label>Other Documents</label>
          <input type="file" id="others" />
        </div>

        <h2>Select Program and Courses</h2>

        <div class="form-group">
          <label>Program</label>
          <select name="program" id="program" required>
            <option value="">Select Program</option>
          </select>
        </div>

        <div class="form-group">
          <label>Year Level</label>
          <select name="year_level" id="year_level" required>
            <option value="">Select Year Level</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
          </select>
        </div>

        <div class="form-group">
          <label>Semester</label>
          <select name="semester" id="semester" required>
            <option value="">Select Semester</option>
            <option value="1st Sem">1st Sem</option>
            <option value="2nd Sem">2nd Sem</option>
            <option value="3rd Sem">3rd Sem</option>
          </select>
        </div>

        <div class="form-group">
          <label>Available Courses</label>
          <div id="course-options" class="select-list"></div>
          <div id="course-selected" class="selected-list"></div>
        </div>

        <section class="table-section" style="margin-top: 16px">
          <h3>Assessment Preview</h3>
          <p><strong>Rate per Unit:</strong> PHP 300.00</p>
          <p><strong>Total Units:</strong> <span id="total-units">0</span></p>
          <p><strong>Total Tuition:</strong> <span id="total-amount">PHP 0.00</span></p>
        </section>

        <button type="button" class="btn btn-primary btn-lg btn-enroll">
          Submit Enrollment
        </button>

        <div id="formMessage" class="form-message"></div>
      </form>
    </div>
    <script>
      const RATE_PER_UNIT = 300;
      let courses = [];
      const selectedCourses = new Set();

      const form = document.querySelector("#enrollmentForm");
      const message = document.getElementById("formMessage");
      const optionsEl = document.querySelector("#course-options");
      const selectedEl = document.querySelector("#course-selected");
      const totalUnitsEl = document.querySelector("#total-units");
      const totalAmountEl = document.querySelector("#total-amount");
      const programEl = document.querySelector("#program");
      const yearLevelEl = document.querySelector("#year_level");
      const semesterEl = document.querySelector("#semester");

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-PH", {
          style: "currency",
          currency: "PHP",
        }).format(Number(value || 0));
      }

      function getSelectedCourseObjects() {
        return [...selectedCourses]
          .map((id) => courses.find((course) => course.id === id))
          .filter(Boolean);
      }

      function updateAssessment() {
        const totalUnits = getSelectedCourseObjects().reduce(
          (sum, course) => sum + Number(course.units || 0),
          0,
        );
        const totalAmount = totalUnits * RATE_PER_UNIT;

        totalUnitsEl.textContent = totalUnits;
        totalAmountEl.textContent = formatCurrency(totalAmount);
      }

      function renderOptions() {
        if (!courses.length) {
          optionsEl.innerHTML =
            "<div class='select-item' style='pointer-events:none;opacity:.7;'>Select a program, year level, and semester to view available courses.</div>";
          return;
        }

        optionsEl.innerHTML = courses
          .map(
            (course) => `
              <div class="select-item" data-id="${course.id}">
                ${course.name} (${course.units} units)
              </div>
            `,
          )
          .join("");
      }

      function renderSelected() {
        selectedEl.innerHTML = getSelectedCourseObjects()
          .map(
            (course) => `
              <div class="selected-item" data-id="${course.id}">
                ${course.name} (${course.units} units) x
              </div>
              <input type="hidden" name="course[]" value="${course.id}">
            `,
          )
          .join("");

        updateAssessment();
      }

      async function loadPrograms() {
        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/programs/list`,
        );
        const data = await response.json();

        programEl.innerHTML = `<option value="">Select Program</option>`;

        data.forEach((program) => {
          const option = document.createElement("option");
          option.value = `${program.id}:${program.name}:${program.code || ""}`;
          option.textContent = `${program.code || program.name} - ${program.name}`;
          programEl.appendChild(option);
        });
      }

      async function loadAvailableCourses() {
        selectedCourses.clear();
        renderSelected();

        const [programId] = (programEl.value || "").split(":");
        const yearLevel = yearLevelEl.value;
        const semester = semesterEl.value;

        if (!programId || !yearLevel || !semester) {
          courses = [];
          renderOptions();
          return;
        }

        const query = new URLSearchParams({
          program_id: programId,
          year_level: yearLevel,
          semester: semester,
        });

        const response = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/courses/list?${query.toString()}`,
        );
        const data = await response.json();

        courses = Array.isArray(data) ? data : [];
        renderOptions();
      }

      optionsEl.addEventListener("click", (event) => {
        const item = event.target.closest(".select-item");

        if (!item || !courses.length) return;

        selectedCourses.add(item.dataset.id);
        renderSelected();
      });

      selectedEl.addEventListener("click", (event) => {
        const item = event.target.closest(".selected-item");

        if (!item) return;

        selectedCourses.delete(item.dataset.id);
        renderSelected();
      });

      [programEl, yearLevelEl, semesterEl].forEach((element) => {
        element.addEventListener("change", loadAvailableCourses);
      });

      form
        .querySelector("button.btn-enroll")
        .addEventListener("click", async (event) => {
          event.preventDefault();

          const selectedCourseObjects = getSelectedCourseObjects();

          if (!selectedCourseObjects.length) {
            message.innerHTML =
              "<span class='error'>Please select at least one available course.</span>";
            return;
          }

          const fileInputs = {
            form137: document.getElementById("form137").files[0],
            idpic: document.getElementById("idpic").files[0],
            psa: document.getElementById("psa").files[0],
            moral: document.getElementById("moral").files[0],
            diploma: document.getElementById("diploma").files[0],
            others: document.getElementById("others").files[0],
          };

          const documents = {};

          for (let key in fileInputs) {
            if (fileInputs[key]) {
              documents[key] = fileInputs[key].name;
            }
          }

          const button = form.querySelector("button");
          button.disabled = true;
          button.textContent = "Submitting...";

          const totalUnits = selectedCourseObjects.reduce(
            (sum, course) => sum + Number(course.units || 0),
            0,
          );
          const totalAmount = totalUnits * RATE_PER_UNIT;
          const [program_id, program_name, program_code] = (
            form.program.value || ""
          ).split(":");

          const formData = {
            last_name: form.last_name.value,
            first_name: form.first_name.value,
            middle_name: form.middle_name.value,
            email: form.email.value,
            mobile: form.mobile.value,
            birthday: form.birthday.value,
            program_id,
            program_name,
            program_code,
            year_level: form.year_level.value,
            semester: form.semester.value,
            selected_courses: selectedCourseObjects.map((course) => ({
              id: course.id,
              name: course.name,
              units: Number(course.units || 0),
              amount: Number(course.units || 0) * RATE_PER_UNIT,
            })),
            total_units: totalUnits,
            total_amount: totalAmount,
            documents,
          };

          try {
            const response = await fetch(
              `${window.APP_CONFIG.API_BASE_URL}/enrollments/create`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(formData),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.message || data.error || "Something went wrong");
            }

            message.innerHTML =
              "<span class='success'>Enrollment submitted successfully!</span>";
            form.reset();
            courses = [];
            selectedCourses.clear();
            renderOptions();
            renderSelected();
          } catch (error) {
            message.innerHTML = `<span class='error'>${error.message}</span>`;
          } finally {
            button.disabled = false;
            button.textContent = "Submit Enrollment";
          }
        });

      document.addEventListener("DOMContentLoaded", async () => {
        await loadPrograms();
        renderOptions();
        renderSelected();
      });
    </script>
  </body>
</html>
