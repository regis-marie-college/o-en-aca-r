<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Enrollments</title>
  </head>
  <body>
    <div class="enrollments">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <div class="info-holder"></div>
        <div class="form-group">
          <label for="approval">Admin approval</label>
          <select id="approval" name="approval" required>
            <option value="Pending">-- Select Decision --</option>
            <option value="Approved">Approved</option>
            <option value="Pending">Pending</option>
            <option value="Declined">Declined</option>
          </select>
        </div>
        <div class="form-group">
          <label for="misc-fee">Misc Fee</label>
          <input
            id="misc-fee"
            name="misc_fee"
            type="number"
            min="0"
            step="0.01"
            placeholder="Enter misc fee"
          />
          <small>
            Treasury can set the miscellaneous fee here before enrollment approval.
          </small>
          <div style="margin-top: 10px">
            <button type="button" id="save-misc-fee">Save Misc Fee</button>
          </div>
        </div>
        <section class="table-section">
          <h2>Submitted Documents</h2>
          <table id="table-documents">
            <thead>
              <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>File</th>
                <th>Type</th>
                <th>Submitted At</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
      <div id="preview">
        <div class="preview-box">
          <button onclick="closePreview()">✕</button>
          <iframe id="frame"></iframe>
        </div>
      </div>
    </div>
    <script>
      let user_data = {};

      async function initApproval() {
        try {
          const approval = document.querySelector("#approval");
          const miscFeeInput = document.querySelector("#misc-fee");

          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");

          approval.addEventListener("change", async () => {
            delete user_data.status;

            const payload = {
              ...user_data,
              id,
              status: approval.value,
              misc_fee: miscFeeInput.value,
            };

            const response = await fetch(
              `${window.APP_CONFIG.API_BASE_URL}/enrollments/update-status`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              alert(data.error || "Failed to update enrollment status");
            }

            readEnrollment();
          });
        } catch (err) {
          console.error("Failed to load enrollments:", err);
        }
      }

      async function loadDocuments() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");

        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/documents/list?enrollment_id=${id}`,
          );
          const data = await res.json();

          const tbody = document.querySelector("#table-documents tbody");
          tbody.innerHTML = "";

          data.forEach((doc) => {
            const row = document.createElement("tr");

            const { id, user_full_name, name, type, created_at } = doc;

            row.innerHTML = `
              <td><a href="#" onclick="openPreview(event)">${id.substring(0, 6)}</a></td>
              <td>${user_full_name}</td>
              <td>${name}</td>
              <td>${type}</td>
              <td>${defaultDate(created_at)}</td>
            `;

            tbody.appendChild(row);
          });
        } catch (err) {
          console.error("Failed to load enrollments:", err);
        }
      }

      async function saveMiscFee() {
        try {
          const approval = document.querySelector("#approval");
          const miscFeeInput = document.querySelector("#misc-fee");
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");

          const response = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/enrollments/update-status`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                id,
                status: approval.value || user_data.status || "Pending",
                misc_fee: miscFeeInput.value,
              }),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            alert(data.error || "Failed to save misc fee");
            return;
          }

          alert("Misc fee saved.");
          await readEnrollment();
        } catch (err) {
          console.error("Failed to save misc fee:", err);
          alert("Failed to save misc fee");
        }
      }

      async function readEnrollment() {
        try {
          const params = new URLSearchParams(window.location.search);
          const id = params.get("id");

          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/enrollments/read?id=${id}`,
          );

          const data = await res.json();

          user_data = data;
          const approval = document.querySelector("#approval");
          const miscFeeInput = document.querySelector("#misc-fee");
          const downpayment = data.downpayment_billing || {};
          const proofValue = String(downpayment.proof_of_payment || "").trim();
          const proofLink = proofValue
            ? `<a href="${proofValue}" target="_blank" rel="noopener noreferrer">View Proof</a>`
            : "-";

          const info = document.querySelector(".info-holder");

          info.innerHTML = `
            <p><strong>ID:</strong> <span style="color: #1d4ed8; font-weight: 700;">${data.id}</span></p>
            <p><strong>Name:</strong> ${data.first_name} ${data.middle_name} ${data.last_name}</p>
            <p><strong>Email:</strong> ${data.email}</p>
            <p><strong>Mobile:</strong> ${data.mobile || "-"}</p>
            <p><strong>Birthday:</strong> ${defaultDate(data.birthday)}</p>
            <p><strong>Created:</strong> ${defaultDate(data.created_at)}</p>
            <p><strong>Updated:</strong> ${defaultDate(data.updated_at)}</p>
            <p><strong>Status:</strong> ${data.status || "Pending"}</p>
            <p><strong>Misc Fee:</strong> ${formatCurrency(data.misc_fee || 0)}</p>
            <hr style="margin:16px 0;border:none;border-top:1px solid rgba(255,255,255,.2);" />
            <p><strong>Downpayment:</strong> ${formatCurrency(downpayment.amount || 0)}</p>
            <p><strong>Payment Status:</strong> ${escapeHtml(downpayment.payment_status || "No payment submitted")}</p>
            <p><strong>Payment Channel:</strong> ${escapeHtml(downpayment.payment_channel || "-")}</p>
            <p><strong>Reference No:</strong> ${escapeHtml(downpayment.reference_no || "-")}</p>
            <p><strong>Treasury Note:</strong> ${escapeHtml(downpayment.notes || "-")}</p>
            <p><strong>Proof:</strong> ${proofLink}</p>
          `;

          approval.value = data.status || "Pending";
          miscFeeInput.value = Number(data.misc_fee || 0);
        } catch (err) {
          console.error("Failed to load enrollments:", err);
        }
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-PH", {
          style: "currency",
          currency: "PHP",
        }).format(Number(value || 0));
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return map[char] || char;
        });
      }

      function openPreview(e) {
        e.preventDefault();

        const preview = document.getElementById("preview");
        const frame = document.getElementById("frame");

        frame.srcdoc = `
          <html>
            <body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;flex-direction:column;">
              <img src="https://images.immediate.co.uk/production/volatile/sites/3/2018/04/avengers-infinity-war-character-posters-55c281a.jpg" width="480" height="480"/>
              <p>Preview not available yet</p>
            </body>
          </html>
        `;

        preview.style.display = "flex";
      }

      function closePreview() {
        document.getElementById("preview").style.display = "none";
      }

      document.addEventListener("DOMContentLoaded", function () {
        initApproval();
        document
          .querySelector("#save-misc-fee")
          .addEventListener("click", saveMiscFee);
        loadDocuments();
        readEnrollment();
      });
    </script>
  </body>
</html>
