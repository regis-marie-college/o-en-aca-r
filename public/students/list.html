<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/user.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Students</title>
    <style>
      .students-toolbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
        margin-bottom: 18px;
      }

      .students-toolbar p {
        margin: 8px 0 0;
        color: #64748b;
      }

      .students-filter {
        min-width: 220px;
      }

      .students-filter select {
        width: 100%;
      }

      @media (max-width: 720px) {
        .students-toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .students-filter {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="users">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <div class="students-toolbar">
          <div>
            <h2>Students</h2>
            <p>This view shows both current and previous-year students based on the enrollment school year.</p>
          </div>
          <div class="students-filter">
            <label for="schoolYearFilter">School Year</label>
            <select id="schoolYearFilter">
              <option value="">All School Years</option>
            </select>
          </div>
        </div>

        <!-- Table -->
        <section class="table-section">
          <table id="table-users">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Program</th>
                <th>School Year</th>
                <th>Approved At</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      const STUDENTS_REFRESH_MS =
        ["localhost", "127.0.0.1"].includes(window.location.hostname) ? 5000 : 20000;
      let isLoadingUsers = false;
      let queuedUsersRefresh = false;

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return map[char] || char;
        });
      }

      async function loadSchoolYears() {
        const select = document.querySelector("#schoolYearFilter");

        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/treasury/statistics`,
          );
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Failed to load school years");
          }

          const years = Array.isArray(data.yearly_comparison)
            ? data.yearly_comparison.map((item) => item.school_year).filter(Boolean)
            : [];

          select.innerHTML = `
            <option value="">All School Years</option>
            ${years
              .map((year) => `<option value="${escapeHtml(year)}">${escapeHtml(year)}</option>`)
              .join("")}
          `;
        } catch (error) {
          select.innerHTML = `<option value="">All School Years</option>`;
        }
      }

      async function loadUsers(options = {}) {
        if (isLoadingUsers) {
          queuedUsersRefresh = true;
          return;
        }

        isLoadingUsers = true;

        try {
          const schoolYear = document.querySelector("#schoolYearFilter")?.value || "";
          const query = new URLSearchParams({ type: "student", limit: "300" });
          if (schoolYear) {
            query.set("school_year", schoolYear);
          }

          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/users/list?${query.toString()}`,
          );
          const data = await res.json();

          const tbody = document.querySelector("#table-users tbody");
          tbody.innerHTML = "";

          if (!Array.isArray(data) || !data.length) {
            tbody.innerHTML = `
              <tr>
                <td colspan="6">No students found for the selected school year.</td>
              </tr>
            `;
            return;
          }

          tbody.innerHTML = data
            .map((user) => {
              const {
                id,
                last_name,
                first_name,
                type,
                email,
                created_at,
                program_name,
                program_code,
                school_year,
              } = user;

              return `
                <tr>
                  <td><a href="read.html?id=${encodeURIComponent(id)}">${escapeHtml(String(id || "").substring(0, 6))}</a></td>
                  <td>${escapeHtml(last_name)} ${escapeHtml(first_name)}</td>
                  <td>${escapeHtml(email)}</td>
                  <td>${escapeHtml(program_name || program_code || type || "-")}</td>
                  <td>${escapeHtml(school_year || "-")}</td>
                  <td>${defaultDate(created_at)}</td>
                </tr>
              `;
            })
            .join("");
        } catch (err) {
          console.error("Failed to load users:", err);
        } finally {
          isLoadingUsers = false;

          if (queuedUsersRefresh && !options.skipQueuedRefresh) {
            queuedUsersRefresh = false;
            loadUsers({ skipQueuedRefresh: true });
          }
        }
      }

      function initAutoRefresh() {
        window.setInterval(() => {
          if (document.hidden) {
            return;
          }

          loadUsers();
        }, STUDENTS_REFRESH_MS);

        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) {
            loadUsers();
          }
        });
      }

      document.addEventListener("DOMContentLoaded", async function () {
        await loadSchoolYears();
        document
          .querySelector("#schoolYearFilter")
          .addEventListener("change", loadUsers);
        loadUsers();
        initAutoRefresh();
      });
    </script>
  </body>
</html>
