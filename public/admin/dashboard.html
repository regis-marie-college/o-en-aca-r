<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/user.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Dashboard</title>
  </head>
  <body>
    <div class="dashboard">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <!-- Stats -->
        <section class="stats">
          <div class="card card-students">
            <h3>Total Students</h3>
            <p>0</p>
          </div>
          <div class="card card-enrollments">
            <h3>Active Enrollment</h3>
            <p>0</p>
          </div>
          <div class="card card-pending">
            <h3>Pending Approval</h3>
            <p>0</p>
          </div>
          <div class="card card-archived">
            <h3>Archived Records</h3>
            <p>0</p>
          </div>
          <div class="card card-courses">
            <h3>My Courses</h3>
            <p>0</p>
          </div>
        </section>

        <!-- Table -->
        <section class="table-section">
          <table id="table-enrollments">
            <thead>
              <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Mobile number</th>
                <th>Birthday</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      const ROLE_CONFIG = {
        admin: {
          showTable: true,
          stats: ["students", "enrollments", "pending", "archived"],
        },

        treasury: {
          showTable: true,
          stats: ["enrollments", "pending", "archived"],
        },

        student: {
          showTable: false,
          stats: ["courses"],
        },
      };

      async function countStudents() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/users/list?type=student`,
        );
        const data = await res.json();

        document.querySelector(".card-students").innerHTML = `
      <h3>Total Students</h3>
      <p>${data.length}</p>
    `;
      }

      async function countEnrollments() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/enrollments/list`,
        );
        const data = await res.json();

        document.querySelector(".card-enrollments").innerHTML = `
      <h3>Active Enrollment</h3>
      <p>${data.length}</p>
    `;
      }

      async function countPendingEnrollments() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/enrollments/list?search=Pending`,
        );
        const data = await res.json();

        document.querySelector(".card-pending").innerHTML = `
      <h3>Pending Approval</h3>
      <p>${data.length}</p>
    `;
      }

      async function countArchived() {
        document.querySelector(".card-archived").innerHTML = `
      <h3>Archived Records</h3>
      <p>0</p>
    `;
      }

      async function loadEnrollments() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/enrollments/list`,
        );

        const data = await res.json();

        const tbody = document.querySelector("#table-enrollments tbody");

        tbody.innerHTML = "";

        data.forEach((enrollment) => {
          const {
            last_name,
            first_name,
            middle_name,
            email,
            mobile_number,
            birthday,
            status,
          } = enrollment;

          const row = document.createElement("tr");

          row.innerHTML = `
        <td>${last_name} ${first_name} ${middle_name}</td>
        <td>${email}</td>
        <td>${mobile_number}</td>
        <td>${defaultDate(birthday)}</td>
        <td>${status}</td>
      `;

          tbody.appendChild(row);
        });
      }

      function hideAllStats() {
        document
          .querySelectorAll(".stats .card")
          .forEach((el) => (el.style.display = "none"));
      }

      function showStat(name) {
        document
          .querySelector(`.card-${name}`)
          ?.style.removeProperty("display");
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const user = auth();

        const config = ROLE_CONFIG[user.type] || ROLE_CONFIG.student;

        hideAllStats();

        config.stats.forEach(showStat);

        if (config.stats.includes("students")) await countStudents();

        if (config.stats.includes("enrollments")) await countEnrollments();

        if (config.stats.includes("pending")) await countPendingEnrollments();

        if (config.stats.includes("archived")) await countArchived();

        if (config.stats.includes("courses")) await countArchived();

        if (config.showTable) {
          await loadEnrollments();
        } else {
          document.querySelector(".table-section")?.remove();
        }
      });
    </script>
  </body>
</html>
