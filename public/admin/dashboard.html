<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Dashboard</title>
  </head>
  <body>
    <div class="dashboard">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <!-- Stats -->
        <section class="stats">
          <div class="card">
            <h3>Total Students</h3>
            <p>1,248</p>
          </div>
          <div class="card">
            <h3>Active Enrollment</h3>
            <p>876</p>
          </div>
          <div class="card">
            <h3>Pending Approval</h3>
            <p>32</p>
          </div>
          <div class="card">
            <h3>Archived Records</h3>
            <p>540</p>
          </div>
        </section>

        <!-- Table -->
        <section class="table-section">
          <table id="table-enrollments">
            <thead>
              <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Mobile number</th>
                <th>Birthday</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      async function loadEnrollments() {
        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/enrollments/list`,
          );
          const data = await res.json();

          const tbody = document.querySelector("#table-enrollments tbody");
          tbody.innerHTML = "";

          data.forEach((enrollment) => {
            const row = document.createElement("tr");

            const {
              id,
              last_name,
              first_name,
              middle_name,
              email,
              mobile_number,
              birthday,
            } = enrollment;

            row.innerHTML = `
              <td>${last_name} ${first_name} ${middle_name}</td>
              <td>${email}</td>
              <td>${mobile_number}</td>
              <td>${defaultDate(birthday)}</td>
            `;

            tbody.appendChild(row);
          });
        } catch (err) {
          console.error("Failed to load enrollments:", err);
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadEnrollments();
      });
    </script>
  </body>
</html>
