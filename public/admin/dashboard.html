<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Dashboard</title>
  </head>
  <body>
    <div class="dashboard">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <!-- Stats -->
        <section class="stats">
          <div class="card">
            <h3>Total Students</h3>
            <p>1,248</p>
          </div>
          <div class="card">
            <h3>Active Enrollment</h3>
            <p>876</p>
          </div>
          <div class="card">
            <h3>Pending Approval</h3>
            <p>32</p>
          </div>
          <div class="card">
            <h3>Archived Records</h3>
            <p>540</p>
          </div>
        </section>

        <!-- Table -->
        <section class="table-section">
          <h2>Recent Enrollments</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Program</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Juan Dela Cruz</td>
                <td>BSIT</td>
                <td><span class="status active">Approved</span></td>
                <td>Feb 25, 2026</td>
              </tr>
              <tr>
                <td>Maria Santos</td>
                <td>BSBA</td>
                <td><span class="status pending">Pending</span></td>
                <td>Feb 24, 2026</td>
              </tr>
              <tr>
                <td>Carlos Reyes</td>
                <td>BSED</td>
                <td><span class="status archived">Archived</span></td>
                <td>Feb 22, 2026</td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
  </body>
</html>
