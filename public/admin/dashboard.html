<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/user.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Dashboard</title>
  </head>
  <body>
    <div class="dashboard">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <!-- Stats -->
        <section class="stats">
          <div class="card card-students">
            <h3>Total Students</h3>
            <p>0</p>
          </div>
          <div class="card card-enrollments">
            <h3>Active Enrollment</h3>
            <p>0</p>
          </div>
          <div class="card card-pending">
            <h3>Pending Approval</h3>
            <p>0</p>
          </div>
          <div class="card card-archived">
            <h3>Archived Records</h3>
            <p>0</p>
          </div>
          <div class="card card-courses">
            <h3>My Courses</h3>
            <p>0</p>
          </div>
          <div class="card card-billings">
            <h3>Total Billings</h3>
            <p>0</p>
          </div>
          <div class="card card-paid-billings">
            <h3>Paid Billings</h3>
            <p>0</p>
          </div>
          <div class="card card-collected">
            <h3>Total Collected</h3>
            <p>PHP 0.00</p>
          </div>
          <div class="card card-outstanding">
            <h3>Outstanding Balance</h3>
            <p>PHP 0.00</p>
          </div>
          <div class="card card-transactions">
            <h3>Total Transactions</h3>
            <p>0</p>
          </div>
        </section>

        <!-- Table -->
        <section class="table-section">
          <h2 class="table-title">Recent Enrollments</h2>
          <table id="table-enrollments">
            <thead>
              <tr>
                <th>Primary</th>
                <th>Secondary</th>
                <th>Third</th>
                <th>Fourth</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      const ROLE_CONFIG = {
        admin: {
          showTable: true,
          stats: [
            "students",
            "enrollments",
            "pending",
            "billings",
            "paid-billings",
            "collected",
            "outstanding",
            "transactions",
          ],
          table: "enrollments",
        },

        treasury: {
          showTable: true,
          stats: [
            "billings",
            "paid-billings",
            "collected",
            "outstanding",
            "transactions",
            "pending",
          ],
          table: "transactions",
        },

        student: {
          showTable: false,
          stats: ["courses"],
        },
      };

      function formatCurrency(value) {
        return new Intl.NumberFormat("en-PH", {
          style: "currency",
          currency: "PHP",
        }).format(Number(value || 0));
      }

      async function getStatistics() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/treasury/statistics`,
        );
        return res.json();
      }

      function setCard(selector, title, value) {
        const card = document.querySelector(selector);
        if (!card) return;

        card.innerHTML = `
          <h3>${title}</h3>
          <p>${value}</p>
        `;
      }

      async function renderStatistics() {
        const stats = await getStatistics();

        setCard(".card-students", "Total Students", stats.students || 0);
        setCard(".card-enrollments", "Active Enrollment", stats.enrollments || 0);
        setCard(
          ".card-pending",
          "Pending Approval",
          stats.pending_enrollments || 0,
        );
        setCard(".card-billings", "Total Billings", stats.total_billings || 0);
        setCard(
          ".card-paid-billings",
          "Paid Billings",
          stats.paid_billings || 0,
        );
        setCard(
          ".card-collected",
          "Total Collected",
          formatCurrency(stats.total_collected),
        );
        setCard(
          ".card-outstanding",
          "Outstanding Balance",
          formatCurrency(stats.total_outstanding),
        );
        setCard(
          ".card-transactions",
          "Total Transactions",
          stats.total_transactions || 0,
        );
      }

      async function loadEnrollments() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/enrollments/list`,
        );

        const data = await res.json();

        const tbody = document.querySelector("#table-enrollments tbody");

        tbody.innerHTML = "";

        data.forEach((enrollment) => {
          const {
            last_name,
            first_name,
            middle_name,
            email,
            mobile,
            birthday,
            status,
          } = enrollment;

          const row = document.createElement("tr");

          row.innerHTML = `
        <td>${last_name} ${first_name} ${middle_name || ""}</td>
        <td>${email}</td>
        <td>${mobile || "-"}</td>
        <td>${defaultDate(birthday)}</td>
        <td>${status}</td>
      `;

          tbody.appendChild(row);
        });
      }

      async function loadTransactions() {
        const res = await fetch(
          `${window.APP_CONFIG.API_BASE_URL}/treasury/transactions/list`,
        );
        const data = await res.json();
        const tbody = document.querySelector("#table-enrollments tbody");
        const thead = document.querySelector("#table-enrollments thead");
        const tableTitle = document.querySelector(".table-title");

        tableTitle.textContent = "Recent Treasury Transactions";
        thead.innerHTML = `
          <tr>
            <th>Reference</th>
            <th>Student</th>
            <th>Description</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        `;
        tbody.innerHTML = "";

        data.forEach((transaction) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${transaction.reference_no}</td>
            <td>${transaction.student_name}</td>
            <td>${transaction.description}</td>
            <td>${formatCurrency(transaction.amount)}</td>
            <td>${transaction.status}</td>
          `;

          tbody.appendChild(row);
        });
      }

      function hideAllStats() {
        document
          .querySelectorAll(".stats .card")
          .forEach((el) => (el.style.display = "none"));
      }

      function showStat(name) {
        document
          .querySelector(`.card-${name}`)
          ?.style.removeProperty("display");
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const user = auth();

        const config = ROLE_CONFIG[user.type] || ROLE_CONFIG.student;

        hideAllStats();

        config.stats.forEach(showStat);

        await renderStatistics();

        if (config.showTable) {
          if (config.table === "transactions") {
            await loadTransactions();
          } else {
            await loadEnrollments();
          }
        } else {
          document.querySelector(".table-section")?.remove();
        }
      });
    </script>
  </body>
</html>
