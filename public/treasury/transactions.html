<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Transaction History</title>
    <style>
      .transactions-toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .transactions-toolbar .search-box {
        flex: 1 1 auto;
      }

      .transactions-toolbar .btn {
        padding: 8px 14px;
        min-height: 36px;
        font-size: 0.9rem;
      }

      .receipt-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 7px 12px;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        font-size: 0.85rem;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      @media (max-width: 720px) {
        .transactions-toolbar {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="users">
      <div data-component="../../components/sidebar.html"></div>

      <main class="main">
        <div data-component="../../components/topbar.html"></div>
        <div class="transactions-toolbar">
          <input
            class="search-box"
            value=""
            placeholder="Search by student name, Gmail/email, or reference no."
          />
          <button type="button" class="btn btn-primary" id="btn-search-transactions">Search</button>
          <button type="button" class="btn btn-secondary" id="btn-clear-transactions">Clear</button>
        </div>

        <section class="table-section">
          <table id="table-transactions">
            <thead>
              <tr>
                <th>Reference No.</th>
                <th>Student</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Payment Method</th>
                <th>Processed By</th>
                <th>Date</th>
                <th>Receipt</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>

    <script>
      function formatCurrency(value) {
        return new Intl.NumberFormat("en-PH", {
          style: "currency",
          currency: "PHP",
        }).format(Number(value || 0));
      }

      async function loadTransactions(search = "") {
        const url = `${window.APP_CONFIG.API_BASE_URL}/treasury/transactions/list${
          search ? `?search=${encodeURIComponent(search)}` : ""
        }`;
        const response = await fetch(url);
        const data = await response.json();
        const tbody = document.querySelector("#table-transactions tbody");

        tbody.innerHTML = "";

        if (!Array.isArray(data) || !data.length) {
          tbody.innerHTML = `
            <tr>
              <td colspan="8">No transaction history found for the current search.</td>
            </tr>
          `;
          return;
        }

        data.forEach((transaction) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${transaction.reference_no}</td>
            <td>${transaction.student_name}<br /><small>${transaction.email}</small></td>
            <td>${transaction.description}</td>
            <td>${formatCurrency(transaction.amount)}</td>
            <td>${transaction.payment_method}</td>
            <td>${transaction.processed_by || "-"}</td>
            <td>${defaultDate(transaction.created_at)}</td>
            <td>
              <a
                class="receipt-link"
                href="./receipt.html?id=${encodeURIComponent(transaction.id)}"
                target="_blank"
                rel="noopener noreferrer"
              >
                Print Receipt
              </a>
            </td>
          `;

          tbody.appendChild(row);
        });
      }

      function initSearch() {
        const searchBox = document.querySelector(".search-box");
        const searchButton = document.querySelector("#btn-search-transactions");
        const clearButton = document.querySelector("#btn-clear-transactions");

        function runSearch() {
          loadTransactions(searchBox.value.trim());
        }

        searchBox.addEventListener("keyup", (event) => {
          if (event.code === "Enter") {
            runSearch();
          }
        });

        searchButton.addEventListener("click", runSearch);
        clearButton.addEventListener("click", () => {
          searchBox.value = "";
          loadTransactions();
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        initSearch();
        loadTransactions();
      });
    </script>
  </body>
</html>
