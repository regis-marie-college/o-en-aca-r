<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Records Accounts</title>
  </head>
  <body>
    <div class="users">
      <div data-component="../../components/sidebar.html"></div>
      <main class="main">
        <div data-component="../../components/topbar.html"></div>
        <a href="../users/create.html?type=records" class="btn btn-primary">+ Add Records Account</a>
        <section class="table-section" style="margin-top: 20px">
          <table id="table-records-users">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      async function loadUsers() {
        const response = await fetch(`${window.APP_CONFIG.API_BASE_URL}/users/list?type=records`);
        const data = await response.json();
        const tbody = document.querySelector("#table-records-users tbody");
        tbody.innerHTML = "";

        data.forEach((user) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${user.id.substring(0, 6)}</td>
            <td>${user.last_name} ${user.first_name}</td>
            <td>${user.email}</td>
            <td>${user.type}</td>
          `;
          tbody.appendChild(row);
        });
      }

      document.addEventListener("DOMContentLoaded", loadUsers);
    </script>
  </body>
</html>
