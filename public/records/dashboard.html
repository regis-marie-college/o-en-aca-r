<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/datetime.js" defer></script>
    <script src="../scripts/user.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Records Dashboard</title>
  </head>
  <body>
    <div class="users">
      <div data-component="../../components/sidebar.html"></div>
      <main class="main">
        <div data-component="../../components/topbar.html"></div>
        <section class="table-section">
          <h2>Document Requests</h2>
          <table id="table-records-requests">
            <thead>
              <tr>
                <th>Student</th>
                <th>Document</th>
                <th>Purpose</th>
                <th>Payment</th>
                <th>Request Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      async function loadRequests() {
        const response = await fetch(`${window.APP_CONFIG.API_BASE_URL}/document_requests/list`);
        const data = await response.json();
        const tbody = document.querySelector("#table-records-requests tbody");
        tbody.innerHTML = "";

        data.forEach((request) => {
          const canProcess = request.payment_status === "Approved";
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${request.student_name}<br /><small>${request.email}</small></td>
            <td>${request.document_type}</td>
            <td>${request.purpose || "-"}</td>
            <td>${request.payment_status}</td>
            <td>${request.request_status}</td>
            <td>
              ${canProcess ? `
                <button type="button" class="btn btn-secondary btn-sm btn-records-action" data-id="${request.id}" data-status="Processing">Processing</button>
                <button type="button" class="btn btn-primary btn-sm btn-records-action" data-id="${request.id}" data-status="Ready for Release">Ready</button>
                <button type="button" class="btn btn-secondary btn-sm btn-records-action" data-id="${request.id}" data-status="Completed">Complete</button>
              ` : "-"}
            </td>
          `;
          tbody.appendChild(row);
        });

        bindActions();
      }

      function bindActions() {
        document.querySelectorAll(".btn-records-action").forEach((button) => {
          button.addEventListener("click", async () => {
            const user = auth();
            const response = await fetch(
              `${window.APP_CONFIG.API_BASE_URL}/document_requests/update`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  id: button.dataset.id,
                  request_status: button.dataset.status,
                  reviewed_by: user.email || user.first_name || "Records",
                }),
              },
            );

            const data = await response.json();
            if (!response.ok) {
              alert(data.error || "Failed to update request");
              return;
            }

            await loadRequests();
          });
        });
      }

      document.addEventListener("DOMContentLoaded", loadRequests);
    </script>
  </body>
</html>
