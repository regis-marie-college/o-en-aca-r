<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../scripts/config.js" defer></script>
    <title>Print Document</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #52607a;
        --line: #ccd5e3;
        --paper: #ffffff;
        --accent: #123b7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: #e2e8f0;
        color: var(--ink);
      }

      .print-shell {
        max-width: 960px;
        margin: 32px auto;
        padding: 0 20px 40px;
      }

      .print-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .print-actions button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        cursor: pointer;
        font-weight: 700;
      }

      .btn-print {
        background: var(--accent);
        color: #fff;
      }

      .btn-close {
        background: #fff;
        color: var(--accent);
      }

      .paper {
        background: var(--paper);
        min-height: 1122px;
        padding: 64px 72px;
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.16);
      }

      .paper-header {
        text-align: center;
        padding-bottom: 24px;
        border-bottom: 2px solid var(--line);
      }

      .paper-header img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        margin-bottom: 12px;
      }

      .paper-header h1 {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: 0.05em;
      }

      .paper-header p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .document-title {
        margin: 36px 0 28px;
        text-align: center;
      }

      .document-title h2 {
        margin: 0;
        font-size: 1.45rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .document-title span {
        display: block;
        margin-top: 8px;
        color: var(--muted);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 28px;
        margin-bottom: 28px;
      }

      .meta-item {
        border-bottom: 1px solid var(--line);
        padding-bottom: 8px;
      }

      .meta-item label {
        display: block;
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }

      .content-copy {
        font-size: 1.03rem;
        line-height: 1.8;
        text-align: justify;
      }

      .records-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 24px;
      }

      .records-table th,
      .records-table td {
        border: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        vertical-align: top;
      }

      .records-table th {
        background: #f8fafc;
        font-size: 0.84rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .signature-block {
        margin-top: 56px;
        display: flex;
        justify-content: flex-end;
      }

      .signature-card {
        width: 280px;
        text-align: center;
      }

      .signature-line {
        margin-top: 46px;
        border-top: 1px solid #0f172a;
        padding-top: 10px;
        font-weight: 700;
      }

      .signature-role {
        color: var(--muted);
      }

      .status-note {
        margin-top: 24px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #eff6ff;
        color: #1d4ed8;
      }

      .empty-state {
        padding: 48px 24px;
        text-align: center;
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.16);
      }

      @media print {
        body {
          background: #fff;
        }

        .print-shell {
          max-width: none;
          margin: 0;
          padding: 0;
        }

        .print-actions {
          display: none;
        }

        .paper {
          box-shadow: none;
          padding: 44px 54px;
        }
      }

      @media (max-width: 720px) {
        .paper {
          padding: 32px 22px;
        }

        .meta-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="print-shell">
      <div class="print-actions">
        <button type="button" class="btn-close" onclick="window.close()">Close</button>
        <button type="button" class="btn-print" onclick="window.print()">Print</button>
      </div>
      <div id="printRoot" class="empty-state">Loading printable template...</div>
    </div>

    <script>
      const TEMPLATE_LABELS = {
        coe: "Certificate of Enrollment",
        cor: "Certificate of Registration",
        tor: "Transcript of Records",
        "good-moral": "Certificate of Good Moral Character",
        cog: "Copy of Grades",
      };

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return map[char] || char;
        });
      }

      function formatDate(value) {
        if (!value) return "-";

        return new Intl.DateTimeFormat("en-PH", {
          year: "numeric",
          month: "long",
          day: "numeric",
        }).format(new Date(value));
      }

      function formatFullName(request, student) {
        const fromStudent = [student?.first_name, student?.middle_name, student?.last_name]
          .filter(Boolean)
          .join(" ");

        return fromStudent || request.student_name || "Student";
      }

      function getAcademicProgram(enrollment, records) {
        const firstRecord = Array.isArray(records) ? records[0] : null;
        const programName =
          firstRecord?.program_name ||
          enrollment?.program_name ||
          enrollment?.program_code ||
          enrollment?.course ||
          enrollment?.program ||
          firstRecord?.course_name ||
          "";
        const major = enrollment?.major ? ` Major in ${enrollment.major}` : "";

        return programName ? `${programName}${major}` : "Not indicated";
      }

      function getSchoolYear(enrollment, records) {
        const firstRecord = Array.isArray(records) ? records[0] : null;
        return (
          enrollment?.school_year ||
          firstRecord?.academic_year ||
          firstRecord?.school_year ||
          "Current School Year"
        );
      }

      function getYearLevel(enrollment, records) {
        const firstRecord = Array.isArray(records) ? records[0] : null;
        return enrollment?.year_level || firstRecord?.year_level || "Not indicated";
      }

      function getSemester(enrollment, records) {
        const firstRecord = Array.isArray(records) ? records[0] : null;
        return enrollment?.semester || firstRecord?.semester || "Not indicated";
      }

      function mapTemplate(template) {
        return TEMPLATE_LABELS[template] || "Requested Document";
      }

      function renderMeta(request, student, enrollment, records) {
        return `
          <div class="meta-grid">
            <div class="meta-item">
              <label>Student Name</label>
              <strong>${escapeHtml(formatFullName(request, student))}</strong>
            </div>
            <div class="meta-item">
              <label>Student ID</label>
              <strong>${escapeHtml(request.student_id || student?.student_number || enrollment?.student_id || student?.id || "-")}</strong>
            </div>
            <div class="meta-item">
              <label>Program</label>
              <strong>${escapeHtml(getAcademicProgram(enrollment, records))}</strong>
            </div>
            <div class="meta-item">
              <label>School Year</label>
              <strong>${escapeHtml(getSchoolYear(enrollment, records))}</strong>
            </div>
            <div class="meta-item">
              <label>Year Level</label>
              <strong>${escapeHtml(getYearLevel(enrollment, records))}</strong>
            </div>
            <div class="meta-item">
              <label>Semester</label>
              <strong>${escapeHtml(getSemester(enrollment, records))}</strong>
            </div>
            <div class="meta-item">
              <label>Purpose</label>
              <strong>${escapeHtml(request.purpose || "For official use")}</strong>
            </div>
            <div class="meta-item">
              <label>Date Prepared</label>
              <strong>${escapeHtml(formatDate(new Date().toISOString()))}</strong>
            </div>
          </div>
        `;
      }

      function formatGrade(value) {
        return value === null || typeof value === "undefined" || value === ""
          ? "-"
          : Number(value).toFixed(2);
      }

      function formatUnits(value) {
        return value === null || typeof value === "undefined" || value === ""
          ? "-"
          : Number(value).toFixed(0);
      }

      function renderRecordsTable(records, template) {
        if (!Array.isArray(records) || !records.length) {
          return `
            <div class="status-note">
              No saved student records are available yet for ${escapeHtml(mapTemplate(template))}.
              You may still print the template and complete it manually if needed.
            </div>
          `;
        }

        return `
          <table class="records-table">
            <thead>
              <tr>
                <th>Course ID</th>
                <th>Course / Subject</th>
                <th>Academic Term</th>
                <th>Units</th>
                <th>Grade</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody>
              ${records
                .map(
                  (record) => `
                    <tr>
                      <td>${escapeHtml(record.course_id || "-")}</td>
                      <td>${escapeHtml(record.course_name || "-")}</td>
                      <td>${escapeHtml(
                        [record.academic_year || record.school_year, record.semester]
                          .filter(Boolean)
                          .join(" | ") || "-",
                      )}</td>
                      <td>${escapeHtml(formatUnits(record.units))}</td>
                      <td>${escapeHtml(formatGrade(record.grade))}</td>
                      <td>${escapeHtml(record.remarks || record.academic_status || "-")}</td>
                    </tr>
                  `,
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function parseSelectedCourses(value) {
        if (Array.isArray(value)) {
          return value;
        }

        if (!value) {
          return [];
        }

        try {
          const parsed = JSON.parse(value);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          return [];
        }
      }

      function renderRegistrationCourses(enrollment) {
        const courses = parseSelectedCourses(enrollment?.selected_courses);
        const totalUnits =
          enrollment?.total_units ||
          courses.reduce((sum, course) => sum + Number(course.units || 0), 0);

        if (!courses.length) {
          return `
            <div class="status-note">
              No current enrolled course list is available yet for this registration.
              Please verify the student's assigned courses from the enrollment record.
            </div>
          `;
        }

        return `
          <table class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Course Code</th>
                <th>Course / Subject</th>
                <th>Units</th>
              </tr>
            </thead>
            <tbody>
              ${courses
                .map(
                  (course, index) => `
                    <tr>
                      <td>${index + 1}</td>
                      <td>${escapeHtml(course.code || course.course_id || "-")}</td>
                      <td>${escapeHtml(course.name || course.course_name || "-")}</td>
                      <td>${escapeHtml(formatUnits(course.units))}</td>
                    </tr>
                  `,
                )
                .join("")}
              <tr>
                <td colspan="3"><strong>Total Units</strong></td>
                <td><strong>${escapeHtml(formatUnits(totalUnits))}</strong></td>
              </tr>
            </tbody>
          </table>
        `;
      }

      function renderBody(template, detail) {
        const { request, student, enrollment, student_records: records } = detail;
        const fullName = formatFullName(request, student);
        const program = getAcademicProgram(enrollment, records);
        const schoolYear = getSchoolYear(enrollment, records);
        const yearLevel = getYearLevel(enrollment, records);
        const semester = getSemester(enrollment, records);

        if (template === "coe") {
          return `
            <div class="content-copy">
              This is to certify that <strong>${escapeHtml(fullName)}</strong> is a bona fide student
              of OENACAR and is officially enrolled in the
              <strong>${escapeHtml(program)}</strong> program for
              <strong>${escapeHtml(yearLevel)}</strong>, <strong>${escapeHtml(semester)}</strong>,
              School Year <strong>${escapeHtml(schoolYear)}</strong>.
              <br /><br />
              This certification is issued upon the request of the above-named student for
              <strong>${escapeHtml(request.purpose || "official purposes")}</strong> and is based on the
              enrollment records currently maintained by the Records Office. The student's enrollment
              status, program information, year level, and school year indicated herein were verified
              from the available school records at the time this document was prepared.
              <br /><br />
              This document may be presented to the requesting agency, office, scholarship provider,
              or other concerned institution as proof that the student is presently enrolled in this
              institution. Any alteration, erasure, or unauthorized reproduction of this certification
              without proper validation from the Records Office shall render this document invalid.
            </div>
          `;
        }

        if (template === "cor") {
          return `
            <div class="content-copy">
              This certifies that <strong>${escapeHtml(fullName)}</strong> is officially registered
              under the program <strong>${escapeHtml(program)}</strong> for the school year
              <strong>${escapeHtml(schoolYear)}</strong>, <strong>${escapeHtml(yearLevel)}</strong>,
              <strong>${escapeHtml(semester)}</strong>. The list below shows the courses currently
              assigned to the student for this registration, with the corresponding academic units.
            </div>
            ${renderRegistrationCourses(enrollment)}
          `;
        }

        if (template === "tor") {
          return `
            <div class="content-copy">
              This transcript of records summarizes the academic entries presently encoded for
              <strong>${escapeHtml(fullName)}</strong>. The table below may be used as the basis for
              official review, release preparation, and final registrar validation.
            </div>
            ${renderRecordsTable(records, template)}
          `;
        }

        if (template === "good-moral") {
          return `
            <div class="content-copy">
              This is to certify that <strong>${escapeHtml(fullName)}</strong>, a student enrolled
              in <strong>${escapeHtml(program)}</strong>, <strong>${escapeHtml(yearLevel)}</strong>,
              <strong>${escapeHtml(semester)}</strong>, School Year
              <strong>${escapeHtml(schoolYear)}</strong>, is known to this institution as a person
              of good moral character.
              <br /><br />
              Based on the records available at the Records Office, the above-named student has not
              been found guilty of any serious disciplinary offense involving dishonesty, misconduct,
              or behavior contrary to the rules and standards of the school as of the date this
              certification is prepared.
              <br /><br />
              This certification is issued upon the request of the student for
              <strong>${escapeHtml(request.purpose || "official purposes")}</strong>. It may be
              presented to the concerned office, agency, school, scholarship provider, employer, or
              other institution requiring proof of good moral standing.
              <br /><br />
              This document is valid only when signed by the authorized representative of the Records
              Office and must not be altered, reproduced, or used for any purpose other than the one
              stated above without proper authorization.
            </div>
          `;
        }

        if (template === "cog") {
          return `
            <div class="content-copy">
              This copy of grades reflects the available academic entries currently saved for
              <strong>${escapeHtml(fullName)}</strong>. Please review each subject entry before release.
            </div>
            ${renderRecordsTable(records, template)}
          `;
        }

        return `
          <div class="content-copy">
            Printable template is not available for this document type.
          </div>
        `;
      }

      function renderPrintPage(template, detail) {
        const { request, student, enrollment, student_records } = detail;
        const root = document.querySelector("#printRoot");
        const templateLabel = mapTemplate(template);
        const signatory = request.reviewed_by || "Records Officer";

        root.className = "paper";
        root.innerHTML = `
          <header class="paper-header">
            <img src="../images/logo.png" alt="School Logo" />
            <h1>OENACAR Records Office</h1>
            <p>Official Document Printing Template</p>
          </header>

          <section class="document-title">
            <h2>${escapeHtml(templateLabel)}</h2>
            <span>Reference Request ID: ${escapeHtml(request.id)}</span>
          </section>

          ${renderMeta(request, student, enrollment, student_records)}
          ${renderBody(template, detail)}

          <div class="signature-block">
            <div class="signature-card">
              <div class="signature-line">${escapeHtml(signatory)}</div>
              <div class="signature-role">Records Office Authorized Signatory</div>
            </div>
          </div>
        `;
      }

      async function loadPrintableTemplate() {
        const params = new URLSearchParams(window.location.search);
        const requestId = params.get("request_id");
        const template = String(params.get("template") || "").toLowerCase();

        if (!requestId || !template) {
          document.querySelector("#printRoot").textContent =
            "Missing request_id or template parameter.";
          return;
        }

        try {
          const response = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/document_requests/read?id=${encodeURIComponent(requestId)}`,
          );
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Failed to load document request details.");
          }

          renderPrintPage(template, data);
        } catch (error) {
          document.querySelector("#printRoot").textContent =
            error.message || "Failed to load printable template.";
        }
      }

      document.addEventListener("DOMContentLoaded", loadPrintableTemplate);
    </script>
  </body>
</html>
