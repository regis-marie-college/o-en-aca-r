<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/user.js" defer></script>
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Courses</title>
    <style>
      .courses-toolbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      .courses-toolbar p {
        margin: 8px 0 0;
        color: #64748b;
      }

      .course-filter-note {
        margin-bottom: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        background: #eff6ff;
        color: #1d4ed8;
        font-weight: 600;
      }

      @media (max-width: 720px) {
        .courses-toolbar {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="courses">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <div class="courses-toolbar">
          <div>
            <h2 id="coursesHeading">Courses</h2>
            <p id="coursesSubcopy">View the available course offerings in the system.</p>
          </div>
          <a href="../courses/create.html" class="btn btn-primary" id="addCourseButton"
            >+ Add Course</a
          >
        </div>
        <div id="courseFilterNote" class="course-filter-note" hidden></div>
        <!-- Table -->
        <section class="table-section">
          <table id="table-courses">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Program</th>
                <th>Major</th>
                <th>Year Level</th>
                <th>Units</th>
                <th>Semester</th>
                <th>Status</th>
                <th>Grade</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };

          return map[char] || char;
        });
      }

      function normalizeCourseKey(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/^_+|_+$/g, "");
      }

      function buildRecordLookup(records) {
        const lookup = new Map();

        (Array.isArray(records) ? records : []).forEach((record) => {
          const keys = [
            normalizeCourseKey(record.course_id),
            normalizeCourseKey(record.course_name),
          ].filter(Boolean);

          keys.forEach((key) => {
            if (!lookup.has(key)) {
              lookup.set(key, record);
            }
          });
        });

        return lookup;
      }

      function findCourseRecord(course, recordLookup) {
        const candidateKeys = [
          course.id,
          course.code,
          course.course_id,
          course.name,
        ].map(normalizeCourseKey);

        return candidateKeys.map((key) => recordLookup.get(key)).find(Boolean) || null;
      }

      function renderCourses(courses, studentRecords = []) {
        const tbody = document.querySelector("#table-courses tbody");
        const recordLookup = buildRecordLookup(studentRecords);
        const renderedRecords = new Set();
        tbody.innerHTML = "";

        if (
          (!Array.isArray(courses) || !courses.length) &&
          (!Array.isArray(studentRecords) || !studentRecords.length)
        ) {
          tbody.innerHTML = `
            <tr>
              <td colspan="11">No courses found for the current view.</td>
            </tr>
          `;
          return;
        }

        (Array.isArray(courses) ? courses : []).forEach((course) => {
          const row = document.createElement("tr");
          const record = findCourseRecord(course, recordLookup);
          if (record?.id) {
            renderedRecords.add(record.id);
          }

          const {
            id,
            name,
            description,
            program_code,
            major,
            year_level,
            units,
            semester,
            status,
          } = course;

          row.innerHTML = `
            <td>${escapeHtml(id.substring(0, 6))}</td>
            <td>${escapeHtml(name)}</td>
            <td>${escapeHtml(description || "-")}</td>
            <td>${escapeHtml(program_code || "-")}</td>
            <td>${escapeHtml(major || "-")}</td>
            <td>${escapeHtml(year_level || "-")}</td>
            <td>${escapeHtml(units || "-")}</td>
            <td>${escapeHtml(semester || "-")}</td>
            <td>${escapeHtml(status || "-")}</td>
            <td>${escapeHtml(record?.grade ?? "-")}</td>
            <td>${escapeHtml(record?.remarks || "-")}</td>
          `;

          tbody.appendChild(row);
        });

        (Array.isArray(studentRecords) ? studentRecords : [])
          .filter((record) => record?.id && !renderedRecords.has(record.id))
          .forEach((record) => {
            const row = document.createElement("tr");

            row.innerHTML = `
              <td>${escapeHtml(String(record.id || "").substring(0, 6) || "-")}</td>
              <td>${escapeHtml(record.course_name || "-")}</td>
              <td>${escapeHtml(record.academic_year || record.school_year || "Imported grade record")}</td>
              <td>${escapeHtml(record.program_name || "-")}</td>
              <td>-</td>
              <td>${escapeHtml(record.year_level || "-")}</td>
              <td>${escapeHtml(record.units ?? "-")}</td>
              <td>${escapeHtml(record.semester || "-")}</td>
              <td>${escapeHtml(record.academic_status || "Recorded")}</td>
              <td>${escapeHtml(record.grade ?? "-")}</td>
              <td>${escapeHtml(record.remarks || "-")}</td>
            `;

            tbody.appendChild(row);
          });
      }

      async function loadUsers() {
        try {
          const user = auth() || {};
          const addButton = document.querySelector("#addCourseButton");
          const filterNote = document.querySelector("#courseFilterNote");
          const heading = document.querySelector("#coursesHeading");
          const subcopy = document.querySelector("#coursesSubcopy");

          let endpoint = `${window.APP_CONFIG.API_BASE_URL}/courses/list`;
          let studentRecords = [];

          if (user.type === "student") {
            if (addButton) {
              addButton.hidden = true;
            }

            heading.textContent = "My Program Courses";
            subcopy.textContent = "Courses shown here are filtered based on your enrolled program, year level, and semester.";

            const portalRes = await fetch(
              `${window.APP_CONFIG.API_BASE_URL}/students/portal?email=${encodeURIComponent(user.email || "")}`,
            );
            const portalData = await portalRes.json();

            if (!portalRes.ok) {
              throw new Error(portalData.error || "Failed to load your enrollment details");
            }

            const enrollment = portalData.enrollment || null;
            studentRecords = Array.isArray(portalData.taken_courses)
              ? portalData.taken_courses
              : [];

            if (!enrollment?.program_id) {
              filterNote.hidden = false;
              filterNote.textContent = studentRecords.length
                ? "Your imported grade records are shown below. Your student account does not have a linked enrolled program yet."
                : "Your student account does not have a linked enrolled program yet, so no filtered courses can be shown.";
              renderCourses([], studentRecords);
              return;
            }

            const query = new URLSearchParams({
              program_id: enrollment.program_id,
              year_level: enrollment.year_level || "",
              semester: enrollment.semester || "",
              major: enrollment.major || "",
            });

            endpoint = `${window.APP_CONFIG.API_BASE_URL}/courses/list?${query.toString()}`;

            filterNote.hidden = false;
            filterNote.textContent = `Showing courses for ${enrollment.program_name || enrollment.program_code || "your program"}${enrollment.major ? ` | Major in ${enrollment.major}` : ""}${enrollment.year_level ? ` | ${enrollment.year_level}` : ""}${enrollment.semester ? ` | ${enrollment.semester}` : ""}.`;
          }

          const res = await fetch(endpoint);
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Failed to load courses");
          }

          renderCourses(data, studentRecords);
        } catch (err) {
          console.error("Failed to load courses:", err);
          renderCourses([]);
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadUsers();
      });
    </script>
  </body>
</html>
