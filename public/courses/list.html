<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Courses</title>
  </head>
  <body>
    <div class="courses">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <a href="../courses/create.html" class="btn btn-primary"
          >+ Add Course</a
        >
        <!-- Table -->
        <section class="table-section">
          <table id="table-courses">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    </div>
    <script>
      async function loadUsers() {
        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/courses/list`,
          );
          const data = await res.json();

          const tbody = document.querySelector("#table-courses tbody");
          tbody.innerHTML = "";

          data.forEach((course) => {
            const row = document.createElement("tr");

            const { id, name, description, status } = course;

            row.innerHTML = `
              <td><a href="read.html?id=${id}">${id.substring(0, 6)}</a></td>
              <td>${name}</td>
              <td>${description}</td>
              <td>${status}</td>
            `;

            tbody.appendChild(row);
          });
        } catch (err) {
          console.error("Failed to load courses:", err);
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadUsers();
      });
    </script>
  </body>
</html>
