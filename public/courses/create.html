<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>Courses</title>
  </head>
  <body>
    <div class="courses">
      <div data-component="../../components/sidebar.html"></div>

      <!-- Main Content -->
      <main class="main">
        <div data-component="../../components/topbar.html"></div>

        <section class="form-section">
          <form id="form-create-courses" class="form-card">
            <div class="form-group">
              <label>Name</label>
              <input type="text" name="name" required />
            </div>

            <div class="form-group">
              <label>Description</label>
              <input type="text" name="description" required />
            </div>

            <div class="form-group">
              <label>Year Level</label>
              <select name="year_level" required>
                <option value="">-- Select Year Level --</option>
                <option value="1st Year">1st Year</option>
                <option value="2nd Year">2nd Year</option>
                <option value="3rd Year">3rd Year</option>
                <option value="4th Year">4th Year</option>
              </select>
            </div>

            <div class="form-group" id="majorGroup" hidden>
              <label>Major</label>
              <select name="major" id="major">
                <option value="">-- Select Major --</option>
                <option value="Filipino">Major in Filipino</option>
                <option value="English">Major in English</option>
                <option value="Mathematics">Major in Mathematics</option>
              </select>
            </div>

            <div class="form-group">
              <label>Units</label>
              <input type="number" name="units" min="1" required />
            </div>

            <div class="form-group">
              <label>Semester</label>
              <select name="semester" required>
                <option value="">-- Select Semester --</option>
                <option value="1st Sem">1st Sem</option>
                <option value="2nd Sem">2nd Sem</option>
                <option value="3rd Sem">3rd Sem</option>
              </select>
            </div>

            <div class="form-group">
              <label for="program">Programs</label>
              <select id="program" name="program" required>
                <option value="">-- Select Program --</option>
              </select>
            </div>

            <button type="button" class="btn btn-primary btn-lg">
              Create courses
            </button>
          </form>

          <div id="formMessage" class="form-message"></div>
        </section>
      </main>
    </div>

    <script>
      function syncMajorVisibility() {
        const programSelect = document.querySelector("#program");
        const majorGroup = document.querySelector("#majorGroup");
        const majorSelect = document.querySelector("#major");
        const [, , programCode] = (programSelect.value || "").split(":");
        const isBsed = String(programCode || "").toUpperCase() === "BSED";

        majorGroup.hidden = !isBsed;
        majorSelect.required = isBsed;

        if (!isBsed) {
          majorSelect.value = "";
        }
      }

      function initForm() {
        const form = document.querySelector("#form-create-courses");
        const form_submit = document.querySelector(
          "#form-create-courses button",
        );
        const message = document.getElementById("formMessage");

        form_submit.addEventListener("click", async (e) => {
          e.preventDefault();

          const button = form.querySelector("button");
          button.disabled = true;
          button.textContent = "Creating...";

          const formData = new FormData(form);

          const selectedProgram = formData.get("program");

          if (!selectedProgram) {
            message.innerHTML =
              "<span class='error'>Please select a valid program.</span>";
            button.disabled = false;
            button.textContent = "Create course";
            return;
          }

          const [program_id, program_name, program_code] =
            selectedProgram.split(":");

          const payload = {
            name: formData.get("name"),
            description: formData.get("description"),
            program_id,
            program_name,
            program_code,
            major: formData.get("major"),
            year_level: formData.get("year_level"),
            units: formData.get("units"),
            semester: formData.get("semester"),
          };

          try {
            const response = await fetch(
              `${window.APP_CONFIG.API_BASE_URL}/courses/create`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(payload),
              },
            );

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || data.message || "Something went wrong");
            }

            message.innerHTML =
              "<span class='success'>Course created successfully!</span>";
            form.reset();
            syncMajorVisibility();
          } catch (error) {
            message.innerHTML = `<span class='error'>${error.message}</span>`;
          } finally {
            button.disabled = false;
            button.textContent = "Create course";
          }
        });
      }

      async function loadPrograms() {
        try {
          const res = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/programs/list`,
          );
          const data = await res.json();

          const select_programs = document.querySelector("select#program");
          select_programs.innerHTML =
            '<option value="">-- Select Program --</option>';

          if (!Array.isArray(data) || !data.length) {
            return;
          }

          data.forEach((program) => {
            const option = document.createElement("option");

            const { id, name, code } = program;

            option.value = `${id}:${name}:${code}`;
            option.textContent = code ? `${code} - ${name}` : name;

            select_programs.appendChild(option);
          });

          syncMajorVisibility();
        } catch (err) {
          console.error("Failed to load programs:", err);
          document.getElementById("formMessage").innerHTML =
            "<span class='error'>Failed to load programs. Please try again.</span>";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        loadPrograms();
        initForm();
        document.querySelector("#program").addEventListener("change", syncMajorVisibility);
      });
    </script>
  </body>
</html>
