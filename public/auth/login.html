<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>LogIn</title>
  </head>
  <body>
    <div class="background"></div>

    <!-- HEADER -->
    <header class="header">
      <h1>REGIS MARIE COLLEGE</h1>
    </header>
    <header class="rmc"></header>

    <!-- TIGER -->
    <img src="../tiger.png.png" class="tiger" />

    <!-- LOGIN CARD -->
    <div class="login-card">
      <h2>Welcome Back!</h2>

      <form>
        <input type="email" name="email" placeholder="Enter Email" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="button" class="login-btn">Sign In</button>
      </form>

      <div class="extra-links">
        <p>Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </div>
    <script>
      const form = document.querySelector(".login-card form");
      const submit = form.querySelector("button");

      async function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function fetchWithRetry(url, options, attempts = 2) {
        let lastError = null;

        for (let attempt = 1; attempt <= attempts; attempt += 1) {
          try {
            return await fetch(url, options);
          } catch (error) {
            lastError = error;

            if (attempt < attempts) {
              await sleep(700);
            }
          }
        }

        throw lastError || new Error("Request failed");
      }

      async function probeApiAvailability() {
        try {
          const response = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/auth/session`,
            {
              method: "GET",
            },
          );

          return response.ok;
        } catch (error) {
          return false;
        }
      }

      submit.addEventListener("click", async (event) => {
        event.preventDefault();

        submit.disabled = true;
        submit.textContent = "Signing in...";

        const formData = new FormData(form);

        const payload = {
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const response = await fetchWithRetry(
            `${window.APP_CONFIG.API_BASE_URL}/auth/login`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || data.message || "Something went wrong");
          }

          if (typeof window.setStoredUser === "function") {
            window.setStoredUser(data);
          } else {
            window.sessionStorage.setItem("user", JSON.stringify(data));
            window.localStorage.removeItem("user");
          }

          const dashboardPath =
            data.type === "student"
              ? "/student/dashboard.html"
              : data.type === "records"
                ? "/records/dashboard.html"
                : "/admin/dashboard.html";

          window.location.assign(dashboardPath);

          form.reset();
        } catch (error) {
          console.error(error);

          const apiReachable = await probeApiAvailability();
          const message = apiReachable
            ? error.message || "Unable to sign in right now."
            : "Cannot reach the local API server right now. Please make sure the backend is running on http://localhost:8000 and try again.";

          alert(message);
        } finally {
          submit.disabled = false;
          submit.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
