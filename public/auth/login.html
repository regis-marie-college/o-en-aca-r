<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../styles/index.css" rel="stylesheet" />
    <script src="../scripts/config.js" defer></script>
    <script src="../scripts/load-component.js" defer></script>
    <title>LogIn</title>
  </head>
  <body>
    <div class="background"></div>

    <!-- HEADER -->
    <header class="header">
      <h1>REGIS MARIE COLLEGE</h1>
    </header>
    <header class="rmc"></header>

    <!-- TIGER -->
    <img src="../tiger.png.png" class="tiger" />

    <!-- LOGIN CARD -->
    <div class="login-card">
      <h2>Welcome Back!</h2>

      <form>
        <input type="email" name="email" placeholder="Enter Email" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="button" class="login-btn">Sign In</button>
      </form>

      <div class="extra-links">
        <p>Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </div>
    <script>
      const form = document.querySelector(".login-card form");
      const submit = form.querySelector("button");

      submit.addEventListener("click", async (event) => {
        event.preventDefault();

        submit.disabled = true;
        submit.textContent = "Signing in...";

        const formData = new FormData(form);

        const payload = {
          email: formData.get("email"),
          password: formData.get("password"),
        };

        try {
          const response = await fetch(
            `${window.APP_CONFIG.API_BASE_URL}/auth/login`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            },
          );

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || data.message || "Something went wrong");
          }

          localStorage.setItem("user", JSON.stringify(data));

          const dashboardPath =
            data.type === "student"
              ? "/student/dashboard.html"
              : data.type === "records"
                ? "/records/dashboard.html"
                : "/admin/dashboard.html";

          window.location.assign(dashboardPath);

          form.reset();
        } catch (error) {
          console.error(error);
          alert(error.message);
        } finally {
          submit.disabled = false;
          submit.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
